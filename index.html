<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cre Perita</title>
    <style>
        /* --- GENERAL DESIGN --- */
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(180deg, #ffccd5 0%, #fff3d9 50%, #b3e5fc 100%);
            background-attachment: fixed;
            margin: 0;
            text-align: center;
            padding: 20px; 
        }
        h1 { color: #d35400; margin-bottom: 30px; }

        /* --- CATEGORY CONTAINER --- */
        .category-container {
            max-width: 500px;
            margin: 0 auto;
            text-align: left;
        }

        /* --- BUTTONS / CATEGORY CARDS --- */
        .category-card {
            background: rgba(255, 243, 217, 0.9);
            border: 2px solid #ffccd5;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s, background-color 0.2s;
        }
        .category-card:active {
            transform: scale(0.98);
        }
        .category-card h2 {
            margin: 0;
            font-size: 1.4rem;
            color: #8b4513;
        }
        .indicator-arrow {
            font-size: 1.2rem;
            font-weight: bold;
            color: #ff7043;
            transition: transform 0.3s;
        }

        /* --- INTERNAL PRODUCT GRID (Hidden by default) --- */
        .grid-container {
            display: none; /* It display dynamically. */
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); /* Optimized for small screens */
            gap: 15px;
            padding: 15px 5px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        /* Helper class for when a category is open. */
        .grid-container.open {
            display: grid;
        }

        .crepa-card {
            background: white;
            padding: 12px;
            border-radius: 12px;
            box-shadow: 0 4px 12px rgba(255, 183, 77, 0.15);
            cursor: pointer;
            transition: transform 0.2s;
            text-align: center;
        }
        .crepa-card:active { 
            transform: scale(0.95);
        }
        .crepa-card img { width: 100%; border-radius: 8px; height: 110px; object-fit: cover; }
        .crepa-card h3 {
            margin: 8px 0 3px;
            font-size: 1rem;
            color: #8b4513;
        }
        .crepa-card small { color: #757575; font-size: 0.8rem; }

        /* --- POP-UP WINDOW (OPTIMIZED MODAL) --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0; top: 0;
            width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.7);
            backdrop-filter: blur(5px);
        }
        .modal-content {
            background: linear-gradient(180deg, #ffccd5 0%, #fff3d9 50%, #b3e5fc 100%);
            background-attachment: fixed;
            padding: 25px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            box-sizing: border-box;
            text-align: left;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .close {
            position: absolute;
            top: 10px; right: 20px;
            font-size: 32px; font-weight: bold; cursor: pointer;
            color: #4a4a4a;
        }
        #img-modal {
            width: 100%;
            height: auto;
            max-height: 220px;
            object-fit: contain;
            display: block;
            margin: 0 auto 15px auto;
            border-radius: 8px;
        }
        #descripcion-modal {
            color: #6d4c41;
            font-family: 'Segoe UI', sans-serif;
            font-weight: 600;
            font-size: 1.05rem;
            line-height: 1.4;
        }
        #titulo-modal {
            color: #ff7043;
            margin-top: 0;
        }
        .precio { color: #27ae60; font-weight: bold; font-size: 1.3rem; margin-bottom: 0; }
    </style>
</head>
<body>

    <h1>Cre Perita</h1>

    <!-- Container with the three main boxes -->
    <div class="category-container">
        
        <!-- Classics Box -->
        <div class="category-card" onclick="toggleCategory('classics', this)">
            <h2>Crepas Clásicas</h2>
            <span class="indicator-arrow">▼</span>
        </div>
        <div id="category-classics" class="grid-container"></div>

        <!-- Salty Box -->
        <div class="category-card" onclick="toggleCategory('salty', this)">
            <h2>Crepas Saladas</h2>
            <span class="indicator-arrow">▼</span>
        </div>
        <div id="category-salty" class="grid-container"></div>

        <!-- Premium Box -->
        <div class="category-card" onclick="toggleCategory('premium', this)">
            <h2>Crepas Premium</h2>
            <span class="indicator-arrow">▼</span>
        </div>
        <div id="category-premium" class="grid-container"></div>

    </div>

    <!-- Modal to view details for each crepa -->
    <div id="miModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <img id="img-modal" src="" alt="Crepa">
            <h2 id="titulo-modal"></h2>
            <p id="descripcion-modal"></p>
            <p class="precio" id="precio-modal"></p>
        </div>
    </div>

    <script>
        // Data organized by: 'Classics', 'Salty' o 'Premium'
        const crepas = [
            { id: 1, categoria: "classics", nombre: "Emi", precio: "$45.00", ingredientes: "Queso Philadelphia, Nutella y Lunetas.", img: "https://images.unsplash.com/photo-1590301157890-4810ed352733?q=80&w=400" },
            { id: 2, categoria: "classics", nombre: "Cherry", precio: "$50.00", ingredientes: "Queso Philadelphia, Nutella y 7 cerezas.", img: "https://images.unsplash.com/photo-1590301157890-4810ed352733?q=80&w=400" },
            { id: 3, categoria: "classics", nombre: "La Mamba", precio: "$50.00", ingredientes: "Queso Philadelphia, Nutella y 1 pastelito Hersheys.", img: "https://images.unsplash.com/photo-1590301157890-4810ed352733?q=80&w=400" },
            { id: 4, categoria: "classics", nombre: "Mazapan", precio: "$55.00", ingredientes: "Nutella, 1 Fruta a elegir y 2 Mazapan.", img: "Images/Mazapan.jpg" },
            { id: 5, categoria: "classics", nombre: "Conejo", precio: "$55.00", ingredientes: "1 Fruta a elegir, 2 Conejos Turin.", img: "https://images.unsplash.com/photo-1590301157890-4810ed352733?q=80&w=400" },
            { id: 6, categoria: "classics", nombre: "CrePerita", precio: "$60.00", ingredientes: "Queso Philadelphia, Fresa natural, Durazno, Nuez y Lechera.", img: "Images/cre_perita.jpg" },
            { id: 7, categoria: "classics", nombre: "Oreo", precio: "$60.00", ingredientes: "Queso Philadelphia, Nutella, 1 Fruta a elegir y 4 Galletas Oreo.", img: "Images/cre_perita.jpg" },
            
            // Ejemplo de Saladas (Ajusta los nombres e ingredientes con tu menú real)
            { id: 8, categoria: "salty", nombre: "Hawaiana", precio: "$50.00", ingredientes: "Queso Oaxaca, Queso Manchego, Jamón y Piña.", img: "https://images.unsplash.com/photo-1590301157890-4810ed352733?q=80&w=400"},
            { id: 9, categoria: "salty", nombre: "Peperoni", precio: "$50.00", ingredientes: "Queso Oaxaca, Queso Manchego y Peperoni.", img: "https://images.unsplash.com/photo-1590301157890-4810ed352733?q=80&w=400" },
            { id: 10, categoria: "salty", nombre: "Pastor", precio: "$60.00", ingredientes: "Queso Oaxaca, Queso Manchego, Pastor y Piña.", img: "https://images.unsplash.com/photo-1590301157890-4810ed352733?q=80&w=400" },
            
            // Ejemplo de Premium
            { id: 20, categoria: "premium", nombre: "Gus Gus", precio: "$70.00", ingredientes: "Queso Philadelphia, Nutella, 1 Fruta a elegir, 2 Ferreros.", img: "https://images.unsplash.com/photo-1590301157890-4810ed352733?q=80&w=400" },
            { id: 27, categoria: "premium", nombre: "Suprema", precio: "$80.00", ingredientes: "Queso Philadelphia, Nutella, Platano, Fresa natural, Durazno, Nuez, Lechera, 1 Kinder Delice.", img: "Images/Suprema.jpg" },
            { id: 30, categoria: "premium", nombre: "Extreme", precio: "$100.00", ingredientes: "Queso Philadelphia, Nutella, 1 Fruta a elegir, 1 Kinder Bueno y 2 Ferreros.", img: "https://images.unsplash.com/photo-1590301157890-4810ed352733?q=80&w=400" },          
            { id: 31, categoria: "premium", nombre: "Bombi", precio: "$130.00", ingredientes: "Nutella, 3 Ferreros, 1 Huevo sorpresa, 1 Kinder Delice.", img: "Images/Bombi.jpg" }            
        ];

        // Automatically insert the cards into their corresponding section.
        crepas.forEach(crepa => {
            const containerDestiny = document.getElementById(`categoria-${crepa.category}`);
            
            if (containerDestiny) {
                const card = document.createElement('div');
                card.className = 'crepa-card';
                card.onclick = (e) => {
                    e.stopPropagation(); // Prevent the click from closing the category accordion.
                    openDetail(crepa.id);
                };
                card.innerHTML = `
                    <img src="${crepa.img}" alt="${crepa.nombre}">
                    <h3>${crepa.nombre}</h3>
                    <small>Ver detalles</small>
                `;
                containerDestiny.appendChild(card);
            }
        });

        // Function to open and close categories (Accordion)
        function toggleCategory(catId, elementoCard) {
            const targetGrid = document.getElementById(`category-${catId}`);
            const arrow = elementoCard.querySelector('.indicator-arrow');
            
            // Check if it is already open
            const isOpen = targetGrid.classList.contains('open');
            
            // First, we close all the categories and reset the arrows.
            document.querySelectorAll('.grid-container').forEach(grid => grid.classList.remove('open'));
            document.querySelectorAll('.indicator-arrow').forEach(fl => fl.style.transform = 'rotate(0deg)');

            // If it wasn't open, we opened it and rotated the arrow.
            if (!isOpen) {
                targetGrid.classList.add('open');
                arrow.style.transform = 'rotate(180deg)';
            }
        }

        // Pop-up (Modal) Logic
        function openDetail(id) {
            const crepa = crepas.find(c => c.id === id);
            document.getElementById('img-modal').src = crepa.img;
            document.getElementById('titulo-modal').innerText = crepa.nombre;
            document.getElementById('descripcion-modal').innerText = crepa.ingredientes;
            document.getElementById('precio-modal').innerText = `Precio: ${crepa.precio}`;
            document.getElementById('miModal').style.display = "block";
        }

        function closeModal() {
            document.getElementById('miModal').style.display = "none";
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('miModal')) {
                closeModal();
            }
        }
    </script>
</body>
</html>
